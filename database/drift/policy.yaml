# Drift policy for membership database module.
# Severity defaults align with DATABASE_FRAMEWORK_SPEC.md section 9.2.

rules:
  - code: missing_table
    severity: error
  - code: extra_table
    severity: warn
  - code: missing_column
    severity: error
  - code: extra_column
    severity: warn
  - code: type_mismatch
    severity: error
  - code: missing_index
    severity: warn
  - code: extra_index
    severity: info
  - code: missing_constraint
    severity: error
  - code: migration_pending
    severity: error
  - code: migration_unknown
    severity: error
  - code: checksum_mismatch
    severity: error

# Reference-only tables are owned by the commerce platform (T0) and registered
# here for contract visibility. Drift on these tables is informational because
# the membership module does not own their schema.
reference_only_tables:
  exempt: true
  rules:
    missing_table: info
    missing_column: info
    type_mismatch: warn
